volumes:
  astro-dist: {}

services:
  pipeline:
    profiles: [pipeline]
    build:
      context: .
      target: pipeline
    env_file: .env
    volumes:
      - ./output:/app/output
    command: uv run cca-archive --all --skip-existing

  frontend:
    build:
      context: .
      target: frontend-build
    environment:
      PUBLIC_LOCAL_IMAGE_BASE: /web
    volumes:
      - ./output/csv:/app/output/csv:ro
      - astro-dist:/app/frontend/dist
    command: npm run build

  web:
    image: nginx:alpine
    volumes:
      - astro-dist:/usr/share/nginx/html
      - ./output/web:/usr/share/nginx/html/web:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      frontend:
        condition: service_completed_successfully
